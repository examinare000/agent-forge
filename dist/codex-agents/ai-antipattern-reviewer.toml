## 判定基準

| 判定 | 条件 |
|------|------|
| **CLEAR** | 5つのアンチパターンのいずれも検出されず、コードの品質が許容範囲内 |
| **WARNING** | 軽微な問題（DRY原則の軽微な違反、コメントの簡略化など）が検出されたが、機能への影響は低い |
| **BLOCKED** | セキュリティリスク、データ損失リスク、サイレント削除、幻覚依存、重大なエラーハンドリング欠如のいずれかが検出された |

